<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Manager Assistant</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      .message p {
        margin: 0;
        padding-bottom: 5px;
      }

      .message img {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        margin-top: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">✨ AI Manager Assistant</div>
      <div class="chat-box" id="chatBox">
        <div class="message ai-msg">
          Hello Manager! How can I help you with the data today? 🚀
        </div>
      </div>
      <div class="input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Ask about data or churn prediction..."
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const chatBox = document.getElementById("chatBox");
      const userInput = document.getElementById("userInput");

      function appendMessage(sender, text) {
        const div = document.createElement("div");
        div.className = `message ${sender === "user" ? "user-msg" : "ai-msg"}`;

        if (sender === "ai") {
          div.innerHTML = marked.parse(text);
        } else {
          div.innerText = text;
        }

        chatBox.appendChild(div);

        setTimeout(() => {
          chatBox.scrollTop = chatBox.scrollHeight;
        }, 100);
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage("user", text);
        userInput.value = "";

        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message ai-msg";
        loadingDiv.innerText = "Thinking... ";
        loadingDiv.id = "loading";
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });
          const data = await response.json();

          document.getElementById("loading").remove();
          appendMessage("ai", data.response);
        } catch (error) {
          document.getElementById("loading").remove();
          appendMessage(
            "ai",
            "Sorry, there was an error processing your request. 😢",
          );
        }
      }

      function handleKeyPress(event) {
        if (event.key === "Enter") {
          sendMessage();
        }
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Manager Assistant</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">AI Manager Assistant</div>
      <div class="chat-box" id="chatBox">
        <div class="message ai-msg">
          Hello Manager! How can I help you with the data today?
        </div>
      </div>
      <div class="input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Ask about analysis or churn prediction..."
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const chatBox = document.getElementById("chatBox");
      const userInput = document.getElementById("userInput");

      function appendMessage(sender, text) {
        const div = document.createElement("div");
        div.className = `message ${sender === "user" ? "user-msg" : "ai-msg"}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight; // Tự động cuộn xuống cuối
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Hiển thị tin nhắn người dùng
        appendMessage("user", text);
        userInput.value = "";

        // Hiển thị trạng thái đang gõ
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message ai-msg";
        loadingDiv.innerText = "Thinking...";
        loadingDiv.id = "loading";
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
          // Gửi tin nhắn tới Flask Backend
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });
          const data = await response.json();

          // Xóa chữ "Thinking..." và hiển thị kết quả
          document.getElementById("loading").remove();
          appendMessage("ai", data.response);
        } catch (error) {
          document.getElementById("loading").remove();
          appendMessage(
            "ai",
            "Sorry, there was an error processing your request.",
          );
        }
      }

      function handleKeyPress(event) {
        if (event.key === "Enter") {
          sendMessage();
        }
      }
    </script>
  </body>
</html>
